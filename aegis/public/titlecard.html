<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AEGIS</title>
<style>
  :root { --scan:#4d8dff; --safe:#2ee6c0; --violet:#a06bff; --ink:#e8edff; --mute:#8794b6; }
  * { margin:0; box-sizing:border-box; }
  html, body { height:100%; }
  body {
    background:
      radial-gradient(1200px 620px at 50% -12%, rgba(77,141,255,.12), transparent 60%),
      radial-gradient(900px 520px at 100% 110%, rgba(160,107,255,.10), transparent 55%),
      radial-gradient(700px 480px at 0% 80%, rgba(46,230,192,.06), transparent 55%),
      #05060a;
    color:var(--ink);
    font-family:'Segoe UI', system-ui, sans-serif;
    overflow:hidden;
    display:grid; place-items:center;
  }
  .grid {
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(80,120,200,.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(80,120,200,.06) 1px, transparent 1px);
    background-size:32px 32px;
    animation:drift 12s linear infinite;
    -webkit-mask-image:radial-gradient(circle at 50% 45%, black, transparent 78%);
    mask-image:radial-gradient(circle at 50% 45%, black, transparent 78%);
  }
  @keyframes drift { to { background-position:32px 32px; } }
  .scanbar {
    position:fixed; left:0; right:0; height:160px;
    background:linear-gradient(180deg, transparent, rgba(77,141,255,.10), transparent);
    animation:sweep 5s linear infinite;
  }
  @keyframes sweep { 0% { top:-160px; } 100% { top:100%; } }
  .wrap { position:relative; text-align:center; z-index:2; padding:0 40px; }
  .shield {
    width:104px; height:104px; margin:0 auto 18px;
    animation:rise .9s cubic-bezier(.2,.7,.2,1) both, glow 3s ease-in-out infinite 1s;
  }
  @keyframes rise { from { opacity:0; transform:translateY(26px) scale(.82);} to { opacity:1; transform:none; } }
  @keyframes glow {
    0%,100% { filter:drop-shadow(0 0 22px rgba(77,141,255,.45)); }
    50% { filter:drop-shadow(0 0 40px rgba(46,230,192,.6)); }
  }
  h1 {
    font-family:'JetBrains Mono', ui-monospace, Consolas, monospace;
    font-size:78px; letter-spacing:.34em; font-weight:800; padding-left:.34em;
    background:linear-gradient(90deg, #ffffff, #9fc2ff, #7be6cf);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    animation:rise 1s .15s both;
  }
  .tag {
    font-family:'JetBrains Mono', ui-monospace, monospace;
    color:var(--mute); letter-spacing:.36em; text-transform:uppercase; font-size:15px;
    margin-top:14px; animation:rise 1s .3s both;
  }
  .line {
    width:0; height:2px; margin:24px auto 0;
    background:linear-gradient(90deg, transparent, var(--scan), var(--safe), transparent);
    animation:grow 1.1s .55s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes grow { to { width:340px; } }
  .sub { margin-top:26px; font-size:22px; opacity:.94; animation:rise 1s .55s both; }
  .meta { margin-top:10px; color:var(--mute); font-size:13px; letter-spacing:.12em; animation:rise 1s .75s both; }
  .pills { margin-top:24px; display:flex; gap:10px; justify-content:center; animation:rise 1s .95s both; }
  .pill {
    font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:.12em;
    color:var(--safe); border:1px solid rgba(46,230,192,.35);
    border-radius:999px; padding:5px 13px;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="scanbar"></div>
  <div class="wrap">
    <svg class="shield" viewBox="0 0 24 24" fill="none">
      <path d="M12 2.5 4 5.5v6c0 4.6 3.2 7.9 8 10 4.8-2.1 8-5.4 8-10v-6L12 2.5Z"
            stroke="#4d8dff" stroke-width="1.3" fill="rgba(77,141,255,.08)"/>
      <path d="M8.6 12.2l2.3 2.3 4.5-4.7" stroke="#2ee6c0" stroke-width="1.7"
            stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h1>AEGIS</h1>
    <div class="tag">The Firewall for AI Agents</div>
    <div class="line"></div>
    <div class="sub" id="sub"></div>
    <div class="meta" id="meta"></div>
    <div class="pills" id="pills"></div>
  </div>
  <script>
    const type = new URLSearchParams(location.search).get('type') || 'intro';
    const sub = document.getElementById('sub');
    const meta = document.getElementById('meta');
    const pills = document.getElementById('pills');
    meta.textContent = 'Microsoft Global Intern Hackathon 2026 · Security & Trust';
    if (type === 'outro') {
      sub.textContent = 'Secure every AI agent.';
      pills.innerHTML = '<span class="pill">100% LOCAL</span><span class="pill">NO KEYS</span><span class="pill">EXPLAINABLE</span>';
    } else {
      sub.textContent = 'Real-time defense for the agentic enterprise.';
      pills.innerHTML = '<span class="pill">PROMPT INJECTION</span><span class="pill">DATA EXFIL</span><span class="pill">SECRET LEAK</span>';
    }
  </script>
</body>
</html>
